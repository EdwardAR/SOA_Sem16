<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colegio San Andrés — Sistema de Matrículas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- LOGIN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">🏫</div>
      <h1>Colegio San Andrés</h1>
      <p class="login-sub">Sistema de Matrículas</p>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="usuario@sanandres.cl" required />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary btn-full">Ingresar</button>
      </form>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app" class="app hidden">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">🏫</span>
        <div class="sidebar-brand">
          <div class="sidebar-title">San Andrés</div>
          <div class="sidebar-sub">Sistema de Matrículas</div>
        </div>
        <button class="sidebar-close" id="sidebar-close">✕</button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a href="#" data-view="dashboard"    class="nav-item active"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="#" data-view="usuarios"     class="nav-item admin-only"><span class="nav-icon">👥</span> Usuarios</a>
        <a href="#" data-view="estudiantes"  class="nav-item"><span class="nav-icon">🎓</span> Estudiantes</a>
        <a href="#" data-view="cursos"       class="nav-item"><span class="nav-icon">📚</span> Cursos</a>
        <a href="#" data-view="matriculas"   class="nav-item"><span class="nav-icon">📋</span> Matrículas</a>
        <a href="#" data-view="reportes"     class="nav-item"><span class="nav-icon">📈</span> Reportes</a>
        <a href="#" data-view="anios"        class="nav-item admin-only"><span class="nav-icon">⚙️</span> Año Escolar</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info-sidebar" id="user-info">
          <div class="user-avatar" id="user-avatar">?</div>
          <div>
            <div class="user-name" id="user-name"></div>
            <div class="user-role" id="user-role"></div>
          </div>
        </div>
        <button class="btn-logout" id="logout-btn"><span>🚪</span> Cerrar sesión</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main" id="main">
      <header class="topbar">
        <button class="menu-btn" id="menu-btn">☰</button>
        <h2 class="page-title" id="page-title">Dashboard</h2>
      </header>
      <div class="content" id="content">
        <!-- Vistas se renderizan aquí -->
      </div>
    </main>
  </div>

  <!-- MODAL GLOBAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Título</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
